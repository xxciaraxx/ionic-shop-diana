<ion-header> 
  <ion-toolbar>
    
    <!-- Left button (menu / back / icon) -->
    <ion-buttons slot="start">
      <ion-button fill="clear">
        <ion-icon name="menu-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <!-- Center title / brand -->
    <ion-title class="nav-title">stitch&loop</ion-title>

    <!-- Right buttons -->
    <ion-buttons slot="end">
      <ion-button fill="clear">Home</ion-button>
      <ion-button fill="clear">Shop</ion-button>
      <ion-button fill="clear">Cart</ion-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>

<ion-content class="page-bg ion-padding">

  <h2 class="section-title">Featured Items</h2>
  <p class="note">Responsive grid: Mobile 1 • Tablet 2 • Desktop 4</p>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" size-lg="3" *ngFor="let i of items">
        <ion-card class="product-card">
          <div class="tag">{{ i.tag }}</div>
          <img [src]="i.img" class="product-img" alt="Product image" />
          <ion-card-header>
            <ion-card-title>{{ i.name }}</ion-card-title>
            <div>{{ i.description }}</div>
            <div class="price-wrapper">
              <span class="currency">₱</span>
              <span class="price {{ i.tag.toLowerCase() }}">{{ i.price }}</span>
            </div>
            <div class="pill">{{ i.category }}</div>
            <div>{{ i.rating }}</div>
          </ion-card-header>

          <ion-card-content>
            <ion-button size="small" expand="block">
              Get It Now
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
